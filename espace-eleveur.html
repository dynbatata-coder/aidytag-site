<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon cheptel — AidyTag</title>
<style>
  :root{
    --navy: #1F3864;
    --navy-deep: #162846;
    --navy-card: rgba(255,255,255,0.04);
    --green-dark: #1F7A4D;
    --green-light: #3DC070;
    --white: #FFFFFF;
    --gray: #96A5C4;
    --gray-light: #C9D2E5;
    --amber: #E0A83E;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  body{
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
  }
  header{
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 6vw;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .logo{ display:flex; align-items:center; gap:14px; text-decoration:none; }
  .logo-icon{
    width: 40px; height: 40px; border-radius: 11px;
    background: var(--green-dark);
    display:flex; align-items:center; justify-content:center;
  }
  .logo-icon svg{ width: 22px; height: 22px; }
  .logo-text{ font-size: 1.3rem; font-weight: 700; color: var(--white); }
  .logo-text span{ color: var(--green-light); }
  .header-right{ display:flex; align-items:center; gap:16px; }
  .user-email{
    font-family: Arial, sans-serif; font-size: 0.85rem; color: var(--gray-light);
  }
  .logout-btn{
    font-family: Arial, sans-serif; font-size: 0.85rem; font-weight: 600;
    color: var(--gray-light); background: transparent;
    border: 1px solid rgba(255,255,255,0.2); border-radius: 999px;
    padding: 9px 18px; cursor: pointer; transition: all 0.2s ease;
  }
  .logout-btn:hover{ border-color: #ff9d9d; color: #ff9d9d; }

  main{ max-width: 1100px; margin: 0 auto; padding: 48px 6vw 100px; }

  .page-title{ font-size: 2rem; margin-bottom: 6px; font-weight: 700; }
  .page-sub{
    font-family: Arial, sans-serif; color: var(--gray-light);
    font-size: 1rem; margin-bottom: 36px;
  }

  .search-bar{
    display:flex; gap:10px; margin-bottom: 36px;
  }
  .search-bar input{
    flex:1; padding: 13px 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; color: var(--white);
    font-family: Arial, sans-serif; font-size: 0.95rem;
    outline: none;
  }
  .search-bar input::placeholder{ color: rgba(255,255,255,0.35); }
  .search-bar input:focus{ border-color: var(--green-light); }
  .search-bar button{
    font-family: Arial, sans-serif; font-weight: 700; font-size: 0.9rem;
    padding: 0 24px; border:none; border-radius: 10px; cursor:pointer;
    background: var(--green-light); color: var(--navy-deep);
  }

  .state-msg{
    font-family: Arial, sans-serif; color: var(--gray-light);
    text-align: center; padding: 60px 20px;
  }

  .grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card{
    background: var(--navy-card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 24px;
    cursor: pointer; transition: border-color 0.2s ease, transform 0.15s ease;
  }
  .card:hover{ border-color: var(--green-light); transform: translateY(-2px); }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 14px; }
  .card-name{ font-size: 1.25rem; font-weight: 700; }
  .card-race{
    font-family: Arial, sans-serif; font-size: 0.8rem; color: var(--gray);
  }
  .badge{
    font-family: Arial, sans-serif; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.03em; padding: 5px 12px; border-radius: 999px;
    text-transform: uppercase;
  }
  .badge.actif, .badge.sain{ background: rgba(61,192,112,0.15); color: var(--green-light); }
  .badge.en-traitement{ background: rgba(224,168,62,0.18); color: var(--amber); }
  .badge.default{ background: rgba(255,255,255,0.1); color: var(--gray-light); }

  .card-details{
    font-family: Arial, sans-serif; font-size: 0.85rem; color: var(--gray-light);
    display: flex; flex-direction: column; gap: 6px;
  }
  .card-details .tag{
    font-family: monospace; font-size: 0.78rem; color: var(--gray);
    margin-top: 8px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.08);
  }

  /* Modal */
  .modal-overlay{
    display:none; position: fixed; inset:0; background: rgba(10,16,30,0.7);
    z-index: 300; align-items:center; justify-content:center; padding: 24px;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background: var(--navy-deep); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px; padding: 36px; max-width: 440px; width:100%;
  }
  .modal h2{ font-size: 1.6rem; margin-bottom: 4px; }
  .modal .modal-race{ font-family: Arial, sans-serif; color: var(--gray); font-size: 0.9rem; margin-bottom: 20px; }
  .modal-row{
    display:flex; justify-content: space-between;
    font-family: Arial, sans-serif; font-size: 0.92rem;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .modal-row .label{ color: var(--gray); }
  .modal-row .value{ font-weight: 600; }
  .modal-close{
    margin-top: 24px; width: 100%;
    font-family: Arial, sans-serif; font-weight: 700; font-size: 0.95rem;
    padding: 13px; border:none; border-radius: 10px; cursor:pointer;
    background: rgba(255,255,255,0.08); color: var(--white);
  }
  .modal-close:hover{ background: rgba(255,255,255,0.14); }
</style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <span class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 5L7 12L15 19" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="16.5" cy="12" r="3" fill="white"/>
      </svg>
    </span>
    <span class="logo-text">Aidy<span>TAG</span></span>
  </a>
  <div class="header-right">
    <span class="user-email" id="userEmail"></span>
    <button class="logout-btn" onclick="handleLogout()">Déconnexion</button>
  </div>
</header>

<main>
  <div class="page-title">Mon cheptel</div>
  <div class="page-sub">Retrouvez ici l'ensemble des animaux enregistrés sous votre compte.</div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Rechercher par UID de tag ou nom...">
    <button onclick="filterAnimals()">Rechercher</button>
  </div>

  <div id="content">
    <div class="state-msg">Chargement de votre cheptel...</div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <h2 id="modalName"></h2>
    <div class="modal-race" id="modalRace"></div>
    <div class="modal-row"><span class="label">UID du tag</span><span class="value" id="modalTag"></span></div>
    <div class="modal-row"><span class="label">Sexe</span><span class="value" id="modalSexe"></span></div>
    <div class="modal-row"><span class="label">Date de naissance</span><span class="value" id="modalNaissance"></span></div>
    <div class="modal-row"><span class="label">Statut</span><span class="value" id="modalStatut"></span></div>
    <button class="modal-close" onclick="closeModal()">Fermer</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://kvhsiaaplfozyhbmozkx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6MkiIQIA_klVT8jP42iE_w_O4dU2JRW';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allAnimals = [];
let currentUserEmail = null;

async function init(){
  const { data: { session } } = await sb.auth.getSession();

  if(!session){
    window.location.href = '/connexion';
    return;
  }

  currentUserEmail = session.user.email;
  document.getElementById('userEmail').textContent = currentUserEmail;

  await loadAnimals();
}

async function loadAnimals(){
  const content = document.getElementById('content');
  const { data, error } = await sb
    .from('animal')
    .select('*')
    .eq('proprietaire_email', currentUserEmail);

  if(error){
    content.innerHTML = '<div class="state-msg">Erreur de chargement : ' + error.message + '</div>';
    return;
  }

  allAnimals = data || [];

  if(allAnimals.length === 0){
    content.innerHTML = '<div class="state-msg">Aucun animal n\'est encore enregistré sous votre compte. Contactez l\'équipe AidyTag pour lier vos tags.</div>';
    return;
  }

  renderAnimals(allAnimals);
}

function statusClass(statut){
  if(!statut) return 'default';
  const s = statut.toLowerCase().replace(/\s+/g, '-');
  if(s === 'actif' || s === 'sain') return s;
  if(s === 'en-traitement') return 'en-traitement';
  return 'default';
}

function renderAnimals(animals){
  const content = document.getElementById('content');

  if(animals.length === 0){
    content.innerHTML = '<div class="state-msg">Aucun résultat pour cette recherche.</div>';
    return;
  }

  const cards = animals.map((a, i) => `
    <div class="card" onclick="openModal(${i})">
      <div class="card-top">
        <div>
          <div class="card-name">${escapeHtml(a.nom || 'Sans nom')}</div>
          <div class="card-race">${escapeHtml(a.race || '—')}</div>
        </div>
        <span class="badge ${statusClass(a.statut)}">${escapeHtml(a.statut || '—')}</span>
      </div>
      <div class="card-details">
        <span>Sexe : ${escapeHtml(a.sexe || '—')}</span>
        <span>Naissance : ${escapeHtml(a.date_naissance || '—')}</span>
        <span class="tag">UID : ${escapeHtml(a.tag_uid || '—')}</span>
      </div>
    </div>
  `).join('');

  content.innerHTML = '<div class="grid">' + cards + '</div>';
  window.__currentList = animals;
}

function filterAnimals(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q){
    renderAnimals(allAnimals);
    return;
  }
  const filtered = allAnimals.filter(a =>
    (a.tag_uid && a.tag_uid.toLowerCase().includes(q)) ||
    (a.nom && a.nom.toLowerCase().includes(q))
  );
  renderAnimals(filtered);
}

document.getElementById('searchInput').addEventListener('keyup', function(e){
  if(e.key === 'Enter') filterAnimals();
  if(this.value.trim() === '') renderAnimals(allAnimals);
});

function openModal(index){
  const a = window.__currentList[index];
  document.getElementById('modalName').textContent = a.nom || 'Sans nom';
  document.getElementById('modalRace').textContent = a.race || '—';
  document.getElementById('modalTag').textContent = a.tag_uid || '—';
  document.getElementById('modalSexe').textContent = a.sexe || '—';
  document.getElementById('modalNaissance').textContent = a.date_naissance || '—';
  document.getElementById('modalStatut').textContent = a.statut || '—';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}

function closeModalOnOverlay(e){
  if(e.target.id === 'modalOverlay') closeModal();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function handleLogout(){
  await sb.auth.signOut();
  window.location.href = '/connexion';
}

init();
</script>

</body>
</html>
